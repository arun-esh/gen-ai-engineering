kind = "web"
previewPath = "/"
title = "Gen AI Engineering"
version = "1.0.0"
id = "artifacts/gen-ai-engineering"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23591

[services.development]
run = "pnpm --filter @workspace/gen-ai-engineering run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gen-ai-engineering", "run", "build" ]
publicDir = "artifacts/gen-ai-engineering/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23591"
BASE_PATH = "/"
